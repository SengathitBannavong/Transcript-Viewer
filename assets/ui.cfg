# ui.cfg — UI display settings for Transcript Viewer
# Changes take effect on next program start (no recompile needed).

# font_scale: multiplier applied to all font sizes
# 1.0 = base sizes, 1.4 = default, 1.8 = larger, 2.0 = very large
font_scale 2.0

# target_fps: target frame rate (min 60, max 240, default 60)
target_fps 124
