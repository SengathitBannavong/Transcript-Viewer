# grad_config.cfg — Graduation rules for this major
#
# Format:  type_id  mode  limit_val  group_id
#
# type_id matches the index_subject_type enum in struct_table.h:
#   1=co_so_nganh       2=dai_cuong          3=the_thao
#   4=ly_luat_chinh_tri 5=tu_chon
#   6=modunI  7=modunII  8=modunIII  9=modunIV  10=modunV  11=modunVI
#   12=thuc_tap         13=do_an_tot_nghiep
#
# Fixed required IDs (must always be present): 1, 2, 3, 4, 5, 12, 13
# Flexible module IDs 6-11: include only modules this major actually uses.
#
# mode:
#   0  total_credit   — must pass ALL credits listed for this type in subjects.dat
#   1  fixed          — must pass exactly limit_val credits
#   2  subject_count  — must pass limit_val *subjects* (not credits)
#
# limit_val:
#   Used only for mode 1 (fixed) and mode 2 (subject_count).
#   Set to 0 for mode 0 — the program counts credits from subjects.dat automatically.
#
# group_id:
#   0  = standalone — checked individually
#   ≥1 = "pick best of group" — only the member with the most passed credits
#        needs to have completed its own full credit requirement.
#        All members with the same group_id form one pick-best group.
#
# To adapt for a different major:
#   • Change limit_val for fixed/subject_count types
#   • Change group_id to create or dissolve pick-best groups
#     (e.g. group_id=0 for modunIV/V if that major has no module IV/V)
#   • Delete the user's .db file to reseed, or run the "reseed" command.
#
# Fixed required IDs: 1,2,3,4,5,12,13  (must appear in both subjects.dat and here)
# Flexible module IDs 6-11: include only those used by this major.
#
#  type_id   mode   limit   group_id
1            0      0       0        # co_so_nganh       — all credits required
2            0      0       0        # dai_cuong         — all credits required
3            2      6       0        # the_thao          — 4 subjects to pass
4            0      0       0        # ly_luat_chinh_tri — all credits required
5            1      9       0        # tu_chon           — fixed 9 credits
6            0      0       1        # modunI            — pick best of group 1
7            0      0       1        # modunII           — pick best of group 1
8            0      0       1        # modunIII          — pick best of group 1
9            0      0       2        # modunIV           — pick best of group 2
10           0      0       2        # modunV            — pick best of group 2
12           0      0       0        # thuc_tap          — all credits required
13           0      0       0        # do_an_tot_nghiep  — all credits required
